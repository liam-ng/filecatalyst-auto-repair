###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# Read metrics from one or more commands that can output to stdout
[[inputs.exec]]
  ## Commands array
  commands = ["/bin/bash /etc/telegraf/telegraf.d/FCnode1.sh"]

  ## Environment variables
  ## Array of "key=value" pairs to pass as environment variables
  ## e.g. "KEY=value", "USERNAME=John Doe",
  ## "LD_LIBRARY_PATH=/opt/custom/lib64:/usr/local/libs"
  #environment = ["queryFrom=$(date -d '-30 minutes' +%s%3N)", "queryTo=$(date +%s%3N)"]

  ## Timeout for each command to complete.
  timeout = "5s"

  ## Measurement name suffix
  ## Used for separating different commands
  # name_suffix = "_FCnode1"

  ## Ignore Error Code
  ## If set to true, a non-zero error code in not considered an error and the
  ## plugin will continue to parse the output.
  # ignore_error = false

  ## Data format
  ## By default, exec expects JSON. This was done for historical reasons and is
  ## different than other inputs that use the influx line protocol. Each data
  ## format has its own unique set of configuration options, read more about
  ## them here:
  ## https://github.com/influxdata/telegraf/blob/master/docs/DATA_FORMATS_INPUT.md
  data_format = "csv"
  
  tags = {bucket_name="FileCatalyst", source = "FCnode1"}
  
  csv_header_row_count = 1
  csv_delimiter = ","
  csv_tag_columns = ["Username","Transfer Type","Direction","Status","Remote Host"]
  csv_tag_overwrite = false
  csv_measurement_column = "Remote Location"
  csv_timestamp_column = "TimeStamp"
  csv_timestamp_format = "unix_ms"
  csv_timezone = "Canada/Eastern"
  csv_skip_errors = false
  csv_reset_mode = "always"
  
[[inputs.exec]]
  commands = ["/bin/bash /etc/telegraf/telegraf.d/FCnode2.sh"]
  timeout = "5s"
  data_format = "csv"
  
  tags = {bucket_name="FileCatalyst", source = "FCnode2"}
  
  csv_header_row_count = 1
  csv_delimiter = ","
  csv_tag_columns = ["Username","Transfer Type","Direction","Status","Remote Host"]
  csv_tag_overwrite = false
  csv_measurement_column = "Remote Location"
  csv_timestamp_column = "TimeStamp"
  csv_timestamp_format = "unix_ms"
  csv_timezone = "Canada/Eastern"
  csv_skip_errors = false
  csv_reset_mode = "always"
    
[[processors.rename]]
	
	[[processors.rename.replace]]
		field = "Transfer Start time"
		dest = "Transfer Start Time"
		
	[[processors.rename.replace]]
		field = "Transfer stop time"
		dest = "Transfer Stop Time"
  
###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

# # Configuration for sending metrics to InfluxDB 2.0
 [[outputs.influxdb_v2]]
#   ## The URLs of the InfluxDB cluster nodes.
#   ##
#   ## Multiple URLs can be specified for a single cluster, only ONE of the
#   ## urls will be written to each interval.
#   ##   ex: urls = ["https://us-west-2-1.aws.cloud2.influxdata.com"]
   urls = ["https://127.0.0.1:8086"]
#
#   ## Local address to bind when connecting to the server
#   ## If empty or not set, the local address is automatically chosen.
#   # local_address = ""
#
#   ## Token for authentication.
   token = ""
#
#   ## Organization is the name of the organization you wish to write to.
   organization = "org"
#
#   ## Destination bucket to write into.
    bucket = "FileCatalyst"
#
#   ## The value of this tag will be used to determine the bucket.  If this
#   ## tag is not set the 'bucket' option is used as the default.
    bucket_tag = "FileCatalyst"

#   ## If true, the bucket tag will not be added to the metric.
#   # exclude_bucket_tag = false

#   ## Timeout for HTTP messages.
#   # timeout = "5s"

#   ## HTTP User-Agent
    user_agent = "telegraf"
	
#   ## Optional TLS Config for use on HTTP connections.
#    tls_ca = "/etc/ssl/influxdb-selfsigned.crt"
#    tls_cert = "/etc/ssl/influxdb-selfsigned.crt"
#    tls_key = "/etc/ssl/influxdb-selfsigned.key"
#   ## Use TLS but skip chain & host verification
    insecure_skip_verify = true
	
	[outputs.influxdb_v2.tagpass]
		bucket_name = ["FileCatalyst"]